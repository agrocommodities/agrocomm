---
- name: Provisionar servidor AgroComm (Rocky Linux 9)
  hosts: agrocomm
  become: true

  vars:
    app_user: nginx
    app_dir: /var/www/agrocomm
    node_version: "24.14.0"

  tasks:
    # ── Dependências do sistema ──────────────────────────────────────────
    - name: Instalar pacotes essenciais
      ansible.builtin.dnf:
        name:
          - git
          - curl
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present

    # ── Node.js via fnm ──────────────────────────────────────────────────
    - name: Baixar script de instalação do fnm
      become: true
      become_user: "{{ app_user }}"
      ansible.builtin.get_url:
        url: https://fnm.vercel.app/install
        dest: /tmp/fnm-install.sh
        mode: "0700"

    - name: Instalar fnm para o usuário {{ app_user }}
      become: true
      become_user: "{{ app_user }}"
      ansible.builtin.command: /tmp/fnm-install.sh
      args:
        creates: "/home/{{ app_user }}/.local/share/fnm"

    - name: Instalar Node.js {{ node_version }}
      become: true
      become_user: "{{ app_user }}"
      ansible.builtin.shell: |
        export PATH="$HOME/.local/share/fnm:$PATH"
        eval "$(fnm env)"
        fnm install {{ node_version }}
        fnm default {{ node_version }}
      args:
        creates: "/home/{{ app_user }}/.local/share/fnm/node-versions/v{{ node_version }}"

    - name: Instalar pnpm via corepack
      become: true
      become_user: "{{ app_user }}"
      ansible.builtin.shell: |
        export PATH="$HOME/.local/share/fnm:$PATH"
        eval "$(fnm env)"
        corepack enable
        corepack prepare pnpm@latest --activate
      args:
        creates: "/home/{{ app_user }}/.local/share/pnpm/pnpm"

    # ── Diretório da aplicação ───────────────────────────────────────────
    - name: Criar diretório da aplicação
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    # ── Nginx ────────────────────────────────────────────────────────────
    - name: Copiar configuração do Nginx (site principal)
      ansible.builtin.copy:
        src: files/nginx/agrocomm.conf
        dest: /etc/nginx/conf.d/agrocomm.conf
        owner: root
        group: root
        mode: "0644"
      notify: Reiniciar nginx

    - name: Copiar configuração do Nginx (CDN)
      ansible.builtin.copy:
        src: files/nginx/cdn.agrocomm.conf
        dest: /etc/nginx/conf.d/cdn.agrocomm.conf
        owner: root
        group: root
        mode: "0644"
      notify: Reiniciar nginx

    - name: Habilitar e iniciar nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    # ── Systemd: serviço principal ───────────────────────────────────────
    - name: Copiar agrocomm.service
      ansible.builtin.copy:
        src: files/systemd/agrocomm.service
        dest: /etc/systemd/system/agrocomm.service
        owner: root
        group: root
        mode: "0644"
      notify: Recarregar systemd

    # ── Systemd: scraper ─────────────────────────────────────────────────
    - name: Copiar agrocomm-scraper.service
      ansible.builtin.copy:
        src: files/systemd/agrocomm-scraper.service
        dest: /etc/systemd/system/agrocomm-scraper.service
        owner: root
        group: root
        mode: "0644"
      notify: Recarregar systemd

    - name: Copiar agrocomm-scraper.timer
      ansible.builtin.copy:
        src: files/systemd/agrocomm-scraper.timer
        dest: /etc/systemd/system/agrocomm-scraper.timer
        owner: root
        group: root
        mode: "0644"
      notify: Recarregar systemd

    - name: Habilitar timer do scraper
      ansible.builtin.systemd:
        name: agrocomm-scraper.timer
        enabled: true
        state: started
        daemon_reload: true

    # ── Systemd: bulletins ───────────────────────────────────────────────
    - name: Copiar agrocomm-bulletins.service
      ansible.builtin.copy:
        src: files/systemd/agrocomm-bulletins.service
        dest: /etc/systemd/system/agrocomm-bulletins.service
        owner: root
        group: root
        mode: "0644"
      notify: Recarregar systemd

    - name: Copiar agrocomm-bulletins.timer
      ansible.builtin.copy:
        src: files/systemd/agrocomm-bulletins.timer
        dest: /etc/systemd/system/agrocomm-bulletins.timer
        owner: root
        group: root
        mode: "0644"
      notify: Recarregar systemd

    - name: Habilitar timer de boletins
      ansible.builtin.systemd:
        name: agrocomm-bulletins.timer
        enabled: true
        state: started
        daemon_reload: true

    # ── Systemd: backup do banco ─────────────────────────────────────────
    - name: Criar diretório de backups
      ansible.builtin.file:
        path: /var/backups/agrocomm
        state: directory
        owner: nginx
        group: nginx
        mode: "0750"

    - name: Copiar agrocomm-backup.service
      ansible.builtin.copy:
        src: files/systemd/agrocomm-backup.service
        dest: /etc/systemd/system/agrocomm-backup.service
        owner: root
        group: root
        mode: "0644"
      notify: Recarregar systemd

    - name: Copiar agrocomm-backup.timer
      ansible.builtin.copy:
        src: files/systemd/agrocomm-backup.timer
        dest: /etc/systemd/system/agrocomm-backup.timer
        owner: root
        group: root
        mode: "0644"
      notify: Recarregar systemd

    - name: Habilitar timer de backup
      ansible.builtin.systemd:
        name: agrocomm-backup.timer
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reiniciar nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted

    - name: Recarregar systemd
      ansible.builtin.systemd:
        daemon_reload: true
