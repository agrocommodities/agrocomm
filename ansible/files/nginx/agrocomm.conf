server {
    listen 80;
    server_name agrocomm.com.br www.agrocomm.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;

    ssl_certificate     /etc/letsencrypt/live/agrocomm.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agrocomm.com.br/privkey.pem;
   
    server_name www.agrocomm.com.br;
    return 301 https://agrocomm.com.br$request_uri;
}

server {
    listen 443 ssl http2;

    ssl_certificate     /etc/letsencrypt/live/agrocomm.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agrocomm.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server_name agrocomm.com.br;

    # Permitir uploads de imagens (6 imagens × 5MB + overhead)
    client_max_body_size 35m;
    
    # Servir imagens estáticas diretamente (não proxiar para Next.js)
    location /images/ {
        alias /var/www/agrocomm/public/images/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        access_log off;
    }

    # Scraping endpoints need a longer timeout (up to 5 min)
    location ~ ^/api/admin/scrape {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
