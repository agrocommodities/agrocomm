# Redirecionamento HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cdn.agrocomm.com.br;
    return 301 https://$host$request_uri;
}

# CDN — servir assets estáticos com cache agressivo
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name cdn.agrocomm.com.br;

    ssl_certificate     /etc/letsencrypt/live/cdn.agrocomm.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.agrocomm.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Segurança básica
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS — permite uso dos assets no domínio principal
    add_header Access-Control-Allow-Origin "https://agrocomm.com.br" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2
        font/woff;

    # Raiz dos assets estáticos do Next.js (export ou .next/static)
    root /var/www/agrocomm/public;

    # _next/static — imutável, cache de 1 ano
    location /_next/static/ {
        alias /var/www/agrocomm/.next/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Imagens e ícones públicos
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        access_log off;
    }

    # Fontes (woff / woff2)
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # JS / CSS / SVG genéricos
    location ~* \.(js|css|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        access_log off;
    }

    # Healthcheck
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # Qualquer outra rota → 404
    location / {
        return 404;
    }
}
